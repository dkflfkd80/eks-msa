# 메트릭 서버 설치
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ordering-hpa
  namespace: soldesk
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ordering-depl
  minReplicas: 1
  maxReplicas: 5

  metrics:			# HPA가 판단할 리소스 기준
  - type: Resource		
    resource:
      name: cpu		# CPU 기준
      target:
        type: Utilization	# 사용률을 기반으로 지정
        averageUtilization: 70	# CPU 소모율이 50%이상일 경우 scale-out
  
  # - type: Resource		
  #   resource:
  #     name: memory	# CPU 기준
  #     target:
  #       type: Utilization	# 사용률을 기반으로 지정
  #       averageUtilization: 70	# CPU 소모율이 50%이상일 경우 scale-out
