
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argo-zindogch-com-tls
  namespace: argocd
spec:
  secretName: argo-zindogch-com-tls
  duration: 2160h #90day
  renewBefore: 360h #before 15day
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: argo.zindogch.com
  dnsNames:
  - argo.zindogch.com